<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- ===== PRIMARY SEO ===== -->
    <title>QubitKode — Web, Mobile, AI & Game Development Agency</title>
    <meta name="description" content="QubitKode is a premier technology agency delivering cutting-edge Web Development, Mobile Apps, AI & Machine Learning, Game Development, SEO, and Digital Marketing solutions worldwide." />
    <meta name="keywords" content="web development agency, mobile app development, AI machine learning, game development, SEO optimization, digital marketing, React, Flutter, Next.js, QubitKode, Pakistan tech agency, software development company" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="author" content="QubitKode" />
    <meta name="theme-color" content="#020508" />

    <!-- ===== CANONICAL ===== -->
    <link rel="canonical" href="https://qubitkode.com/" />

    <!-- ===== LOCAL / GEO SEO ===== -->
    <meta name="geo.region" content="PK" />
    <meta name="geo.placename" content="Pakistan" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />

    <!-- ===== OPEN GRAPH (Facebook, LinkedIn, WhatsApp) ===== -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="QubitKode" />
    <meta property="og:title" content="QubitKode — We Code The Future" />
    <meta property="og:description" content="Premier technology agency specialising in Web, Mobile, AI, Game Development & Digital Marketing. Building digital products that stand apart." />
    <meta property="og:url" content="https://qubitkode.com/" />
    <meta property="og:image" content="https://qubitkode.com/logo512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt" content="QubitKode Logo" />
    <meta property="og:locale" content="en_US" />

    <!-- ===== TWITTER / X CARDS ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@qubitkode" />
    <meta name="twitter:creator" content="@qubitkode" />
    <meta name="twitter:title" content="QubitKode — We Code The Future" />
    <meta name="twitter:description" content="Premier technology agency specialising in Web, Mobile, AI, Game Development & Digital Marketing. Building digital products that stand apart." />
    <meta name="twitter:image" content="https://qubitkode.com/logo512.png" />
    <meta name="twitter:image:alt" content="QubitKode — Technology Agency" />

    <!-- ===== ICONS & PWA ===== -->
    <link rel="icon" href="%PUBLIC_URL%/logo.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ===== FONT PRECONNECT (Performance) ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ===== JSON-LD: ORGANIZATION SCHEMA ===== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "QubitKode",
      "alternateName": "Qubit Kode",
      "url": "https://qubitkode.com",
      "logo": "https://qubitkode.com/logo512.png",
      "description": "QubitKode is a premier technology agency specialising in Web Development, Mobile Apps, AI & Machine Learning, Game Development, SEO, and Digital Marketing.",
      "foundingDate": "2021",
      "areaServed": "Worldwide",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "PK",
        "addressRegion": "Pakistan"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+44-7988-525060",
        "contactType": "Customer Service",
        "email": "contact@qubitkode.com",
        "availableLanguage": "English"
      },
      "sameAs": [
        "https://www.linkedin.com/company/qubitkode/",
        "https://www.facebook.com/qubitkode/",
        "https://www.instagram.com/qubit.kode"
      ]
    }
    </script>

    <!-- ===== JSON-LD: WEBSITE SCHEMA (Enables Google Sitelinks Search Box) ===== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "QubitKode",
      "url": "https://qubitkode.com",
      "description": "Premier technology agency for Web, Mobile, AI & Game Development",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://qubitkode.com/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ===== JSON-LD: LOCAL BUSINESS ===== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "QubitKode",
      "image": "https://qubitkode.com/logo512.png",
      "url": "https://qubitkode.com",
      "telephone": "+44-7988-525060",
      "email": "contact@qubitkode.com",
      "description": "Premier technology agency delivering Web, Mobile, AI, Game Development, SEO & Digital Marketing solutions.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "PK"
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
        "opens": "00:00",
        "closes": "23:59"
      },
      "priceRange": "$$",
      "currenciesAccepted": "USD, GBP, PKR",
      "paymentAccepted": "Bank Transfer, PayPal"
    }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
